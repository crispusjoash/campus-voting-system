services:
  # ─── Backend Web Service ───────────────────────────────────────────────────
  - type: web
    name: mmust-voting-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
      # PostgreSQL connection (auto-filled when linked to a Render DB)
      - key: DATABASE_URL
        fromDatabase:
          name: mmust-voting-db
          property: connectionString

  # ─── Frontend Static Site ──────────────────────────────────────────────────
  - type: web
    name: mmust-voting-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: mmust-voting-db
    databaseName: campus_voting_db
    user: mmust_admin
